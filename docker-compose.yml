version: '3.8'

services:
  # Flask Web应用
  web:
    build: .
    container_name: lab-web
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - lab-net
    restart: unless-stopped

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: lab-redis
    networks:
      - lab-net
    restart: unless-stopped

  # MySQL数据库（演示用，本项目暂不连接，方便报告里多展示一个服务）
  mysql:
    image: mysql:8.0
    container_name: lab-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=labpass123
      - MYSQL_DATABASE=labdb
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - lab-net
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    image: nginx:1.25-alpine
    container_name: lab-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - lab-net
    restart: unless-stopped

networks:
  lab-net:
    driver: bridge

volumes:
  mysql-data: